<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Nepal Administrative Divisions</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Nepal Administrative Divisions Search</h1>

    <select id="provinceDropdown">
    <option value="">Select Province</option>
    </select>

    <select id="districtDropdown" disabled>
    <option value="">Select District</option>
    </select>

    <select id="localDropdown" disabled>
    <option value="">Select Local Level</option>
    </select>

    <input type="text" id="searchBox" placeholder="Search for Province, District or Local Level" />
    <div id="suggestions" class="suggestions"></div>

    <div id="results"></div>

    <script src="script.js"></script>
</body>
</html>
